<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison Fleur | Konto</title>
    <meta name="description" content="Einfaches Benutzerkonto mit Login und Logout über Web Storage API." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="index.html" class="logo">Maison Fleur</a>
        <button class="nav-toggle" aria-label="Menü öffnen" aria-expanded="false">
          &#9776;
        </button>
        <nav class="nav-links">
          <a href="index.html">Start</a>
          <a href="produkte.html">Produkte</a>
          <a href="wishlist.html">Merkliste (<span data-wishlist-count>0</span>)</a>
          <a href="cart.html">Warenkorb (<span data-cart-count>0</span>)</a>
          <a href="account.html" class="active">Konto</a>
          <a href="ueber-uns.html">Über uns</a>
          <a href="kontakt.html">Kontakt</a>
        </nav>
      </div>
    </header>

    <main class="container section">
      <div class="section-head">
        <div>
          <p class="eyebrow">Web Storage API Demo</p>
          <h1>Benutzerkonto</h1>
          <p class="intro-text">
            Dieses Konto ist eine einfache Browser-Demo mit lokal gespeicherten Daten.
          </p>
        </div>
      </div>
      <div class="account-layout">
        <section class="info-box">
          <h2>Konto erstellen oder einloggen</h2>
          <form id="accountForm" class="order-form">
            <label>
              Benutzername
              <input type="text" name="username" required />
            </label>
            <label>
              E-Mail
              <input type="email" name="email" required />
            </label>
            <button class="btn btn-primary" type="submit">Speichern und einloggen</button>
            <p id="accountMessage" class="form-message"></p>
          </form>
        </section>
        <section id="accountStatus" class="info-box"></section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>&copy; <span id="year"></span> Maison Fleur</p>
        <p>Konto lokal gespeichert mit Web Storage API.</p>
      </div>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
