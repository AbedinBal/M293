<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison Fleur | Produkte</title>
    <meta
      name="description"
      content="Alle Produkte von Maison Fleur mit Kategoriefilter, Merkliste und Warenkorb."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="index.html" class="logo">Maison Fleur</a>
        <button class="nav-toggle" aria-label="Menü öffnen" aria-expanded="false">
          &#9776;
        </button>
        <nav class="nav-links">
          <a href="index.html">Start</a>
          <a href="produkte.html" class="active">Produkte</a>
          <a href="wishlist.html">Merkliste (<span data-wishlist-count>0</span>)</a>
          <a href="cart.html">Warenkorb (<span data-cart-count>0</span>)</a>
          <a href="account.html">Konto</a>
          <a href="ueber-uns.html">Über uns</a>
          <a href="kontakt.html">Kontakt</a>
        </nav>
      </div>
    </header>

    <main class="container section">
      <div class="section-head">
        <div>
          <p class="eyebrow">Kollektion 2026</p>
          <h1>Unsere Düfte</h1>
          <p class="intro-text">
            Filtere alle Produkte nach Kategorie und lege Produkte direkt in Merkliste oder Warenkorb.
          </p>
        </div>
      </div>

      <section class="filter-panel">
        <div class="filter-actions" id="categoryFilters" aria-label="Produkte nach Kategorien filtern"></div>
      </section>

      <section>
        <div id="productCount" class="result-count"></div>
        <div id="productGrid" class="card-grid product-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>&copy; <span id="year"></span> Maison Fleur</p>
        <p>Kuratiert für Alltag, Events und besondere Geschenke.</p>
      </div>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
